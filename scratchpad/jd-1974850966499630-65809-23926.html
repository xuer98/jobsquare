<!DOCTYPE html><html id="facebook" class="_9dls _9t1d" lang="en" dir="ltr"><head><link data-default-icon="https://static.xx.fbcdn.net/rsrc.php/y3/r/iUyd7C5uqWN.webp" rel="shortcut icon" href="https://static.xx.fbcdn.net/rsrc.php/y3/r/iUyd7C5uqWN.webp" /><meta name="bingbot" content="noarchive" /><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=2,shrink-to-fit=no" /><meta name="title" content="Software Engineer, Systems ML - Compilers / Backend" /><meta property="og:title" content="Software Engineer, Systems ML - Compilers / Backend" /><meta name="description" content="Reality Labs (RL) focuses on delivering Meta&#039;s vision through Virtual Reality (VR), Augmented Reality (AR) and Wearable AI Devices. The compute performa..." /><meta property="og:description" content="Reality Labs (RL) focuses on delivering Meta&#039;s vision through Virtual Reality (VR), Augmented Reality (AR) and Wearable AI Devices. The compute performa..." /><meta property="og:image" content="https://lookaside.fbsbx.com/elementpath/media/?media_id=1002056384941451&amp;version=1784054054" /><link rel="canonical" href="https://www.metacareers.com/profile/job_details/1974850966499630/" /><script type="application/ld+json" nonce="0g3o083T">{"\u0040context":"http:\/\/schema.org\/","\u0040type":"JobPosting","title":"Software Engineer, Systems ML - Compilers \/ Backend","description":"Reality Labs (RL) focuses on delivering Meta's vision through Virtual Reality (VR), Augmented Reality (AR) and Wearable AI Devices. The compute performance and power efficiency requirements of our AI devices require custom silicon. Reality Labs Silicon team is driving the state of the art forward with breakthrough work in computer vision, machine learning, mixed reality, graphics, displays, sensors, and new ways to map the human body. Our chips will unlock personalized on-device AI capabilities and blend virtual, physical worlds on wearable devices. We believe the only way to achieve our goals is to look at the entire stack, from transistors, through architecture, firmware, and algorithms.\n\nWe are seeking a software engineer to support the development of the compiler tool-chain for state-of-the-art deep learning hardware components optimized for AR\/VR systems. You will be part of our efforts to architect, design and implement a clean slate compiler for this activity and will be part of a team that includes compiler, machine learning algorithms and software, firmware and ASIC experts. You will contribute to a full stack development effort compiling PyTorch models down to binaries for custom hardware accelerator blocks.","responsibilities":"Analyze and design effective compiler passes and optimizations. Implement and\/or enhance code generation targeting machine learning accelerators&nbsp;Work with algorithm research teams to map ML graphs to hardware implementations, model data-flows, create cost-benefit analysis and estimate silicon power and performance&nbsp;Work with hardware architects to co-design hardware features that maximize performance, power efficiency and programmability&nbsp;Contribute to the development of machine-learning libraries, intermediate representations, export formats, and analysis tools&nbsp;Analyze and improve the efficiency, scalability, and stability of our toolchains. Optimize and tune kernels and compiled code to achieve latency targets for ML inference&nbsp;Conduct design and code reviews. Evaluate code performance, debug, diagnose and drive resolution of compiler and cross-disciplinary system issues&nbsp;Interface with other compiler-focused teams to evaluate and incorporate their innovations and vice versa","hiringOrganization":{"\u0040type":"Organization","name":"Meta","sameAs":"https:\/\/www.meta.com\/","logo":"https:\/\/static.xx.fbcdn.net\/rsrc.php\/y3\/r\/7ngPh_7s-rQ.webp"},"datePosted":"2026-07-09T16:52:09-07:00","validThrough":"2026-08-15T04:35:58-07:00","jobLocation":[{"\u0040type":"Place","name":"Sunnyvale, CA","address":{"\u0040type":"PostalAddress","addressLocality":"Sunnyvale","addressRegion":"CA","addressCountry":{"\u0040type":"Country","name":["USA"]}}}],"qualifications":"Bachelor's degree in Computer Science, Computer Engineering, relevant technical field, or equivalent practical experience&nbsp;2+ years experience developing compilers, toolchains, runtime, or similar code optimization software&nbsp;Experience in software design and programming experience in Python and\/or C\/C++ for development, debugging, testing and performance analysis&nbsp;Experience in AI framework development or accelerating models on hardware architectures (GPU, TPU, custom AI ASICs) Experience of developing in a mainstream machine-learning framework, e.g. PyTorch, MLIR, Tensorflow or Caffe&nbsp;Experience with machine-code generation or compiler back-ends for on-device inference workloads&nbsp;Experience working and communicating cross functionally in a team environment&nbsp;Experience working on and contributing to an active compiler toolchain codebase, such as LLVM, MLIR, GCC, MSVC, Glow&nbsp;Demonstrated ongoing AI skill development (e.g., prompt\/context engineering, agent orchestration) and staying current with emerging AI technologies&nbsp;Experience adhering to and implementing responsible, ethical AI practices (e.g., risk assessment, bias mitigation, quality and accuracy reviews)&nbsp;Experience in deep learning algorithms and techniques, e.g., convolutional neural networks, recurrent networks, etc&nbsp;Demonstrated ability to integrate AI tools to optimize\/redesign workflows and drive measurable impact (e.g., efficiency gains, quality improvements)&nbsp;Experience developing high-performance kernels or runtime components and tuning them for inference specific accelerator platforms","employmentType":"Full-time","directApply":true}</script><style nonce="0g3o083T">:root, .__fb-light-mode:root, .__fb-light-mode {--big-blue-40:#56A1EB;--big-blue-50:#2887E6;--big-blue-60:#066CD2;--bi
