  <meta name="description" content="🚀 JOIN THE FUTURE OF COMMERCE WITH WHATNOT!

Whatnot is the largest live shopping platform in North America and Europe to buy, sell, and discover the things you love. Whether it&#39;s trading cards, fashion, electronics, or live plants, our sellers are building real businesses across hundreds of categories. We&#39;re building live commerce at a scale that&#39;s never been done in the West, and there&#39;s no playbook to copy. The people here are shaping how an entirely new industry develops.

As a remote co-located team, we&#39;re inspired by our values https://www.whatnot.com/careers and anchored in hubs across the US, UK, Ireland, Poland, Germany, and Australia. We move fast, stay close to our users, and focus on the work that drives the most impact.

We&#39;re one of the fastest growing marketplaces https://www.nytimes.com/2025/10/28/business/dealbook/whatnot-livestream-shopping-fundraise.html and were recently named the #1 Best Startup Employer in America https://www.forbes.com/lists/americas-best-startup-employers/ by Forbes. Check out the latest Whatnot updates on our news https://blog.teamwhatnot.com/ and engineering blogs https://medium.com/whatnot-engineering and join us as we enable anyone to turn their passion into a business and bring people together through commerce.

💻 Role

The Data Platform team at Whatnot builds services that improve our core product experience and unlock meaningful business value. In this role, you will:

 - Define technical direction and lead development of critical data platform systems that power next-generation capabilities at Whatnot

 - Lead the buildout and evolution of our data orchestration and streaming platforms, helping drive them from early platform investment to production-ready usage across the company

 - Design scalable, reliable, multi-tenant data infrastructure rather than simply building pipelines on top of an existing platform

 - Own core platform concerns including scalability, performance, reliability, SLOs, and operational excellence for data processing systems

 - Build high-quality systems that support real-time analytics, event-driven applications, and machine learning infrastructure needs across Whatnot

 - Make key decisions about how data systems should be integrated across Whatnot, and then partner cross-functionally to bring that architecture to life

 - Collaborate closely with engineering partners across product, platform, machine learning, and data to enable fast, safe, and scalable development

 - Help shape broader company architecture across orchestration, stream processing, real-time systems, analytics, and content understanding

 - Apply DevOps/SRE practices, including CI/CD, infrastructure automation, monitoring, and incident response, to keep platform systems reliable at scale

 - Help define and enforce data governance and compliance standards across our data lake and downstream systems

👋 You

As our next Software Engineer, Data Platform, you should have 8+ years of experience, plus:

 - Ability to write well-tested, API-driven applications and services that run at scale in production

 - Track record of building scalable, high-performance distributed systems

 - Strong experience with streaming data systems (e.g., Kafka, Flink, or Pulsar) and/or orchestration platforms (e.g., Airflow, Dagster, or Temporal), with particular strength in building or evolving the platform layer itself, not just downstream pipelines.

 - Hands-on experience designing and operating stateful, real-time data pipelines at scale, including concepts like checkpointing, state management, and watermarking

 - Experience evaluating architectural tradeoffs in data processing and orchestration systems, including when a given tool is the right solution and when it is not

 - Experience building multi-tenant or end-to-end data infrastructure that supports multiple teams or production use cases

 - Expertise in managing cloud data stores (Snowflake, BigQuery, Redshift, etc.) and data lake architectures (e.g., AWS S3) for processing and serving data products

 - Strong experience supporting operational systems to ensure uptime, reliability, and maintainability, including monitoring, alerting, and incident management

 - Familiarity with DevOps/SRE practices and CI/CD tooling, including GitHub and GitHub Actions

 - Understanding of data governance and compliance principles (e.g., data access controls, retention policies, auditability)

In addition to these role-specific qualifications, all engineering team members are expected to have:

 - Experience managing cloud technologies (AWS or Google Cloud) and comfort with infrastructure-as-code approaches (for example, Terraform)

 - Proficiency in at least one server-side programming language (preferably Python), common algorithms and data structures, and software design principles

 - Self-starter ethic, with the ability to thrive under a high level of autonomy

 - Exceptional interpersonal and communication skills



🎁 BENEFITS

 - Generous Holiday and Time off Policy

 - Health Insurance options including Medical, Dental, Vision

 - Work From Home Support
   
   - Home office setup allowance
   
   - Monthly allowance for cell phone and internet

 - Care benefits
   
   - Monthly allowance for wellness
   
   - Annual allowance towards Childcare
   
   - Lifetime benefit for family planning, such as adoption or fertility expenses

 - Retirement; 401k offering for Traditional and Roth accounts in the US (employer match up to 4% of base salary) and Pension plans internationally

 - Monthly allowance to dogfood the app
   
   - All Whatnauts are expected to develop a deep understanding of our product. We&#39;re passionate about building the best user experience, and all employees are expected to use Whatnot as both a buyer and a seller as part of their job (our dogfooding budget makes this fun and easy!).

 - Parental Leave
   
   - 16 weeks of paid parental leave + one month gradual return to work *company leave allowances run concurrently with country leave requirements which take precedence.


💛 EOE

Whatnot is proud to be an Equal Opportunity Employer. We value diversity, and we do not discriminate on the basis of race, religion, color, national origin, gender, sexual orientation, age, marital status, veteran status, parental status, disability status, or any other status protected by local law. We believe that our work is better and our company culture is improved when we encourage, support, and respect the different skills and experiences represented within our workforce." />

le that's never been done in the West, and there's no playbook to copy. The people here are shaping how an entirely new industry develops.</p><p style=\"min-height:1.5em\">As a remote co-located team, we're inspired by our <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.whatnot.com/careers\"><u>values</u></a> and anchored in hubs across the US, UK, Ireland, Poland, Germany, and Australia. We move fast, stay close to our users, and focus on the work that drives the most impact.</p><p style=\"min-height:1.5em\">We're one of the <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.nytimes.com/2025/10/28/business/dealbook/whatnot-livestream-shopping-fundraise.html\"><u>fastest growing marketplaces</u></a> and were recently named the <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://www.forbes.com/lists/americas-best-startup-employers/\"><u>#1 Best Startup Employer in America</u></a> by Forbes. Check out the latest Whatnot updates on our <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://blog.teamwhatnot.com/\"><u>news</u></a> and <a target=\"_blank\" rel=\"noopener noreferrer nofollow\" href=\"https://medium.com/whatnot-engineering\"><u>engineering blogs</u></a> and join us as we enable anyone to turn their passion into a business and bring people together through commerce.</p><p style=\"min-height:1.5em\"><strong>💻 Role</strong></p><p style=\"min-height:1.5em\">The Data Platform team at Whatnot builds services that improve our core product experience and unlock meaningful business value. In this role, you will:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Define technical direction and lead development of critical data platform systems that power next-generation capabilities at Whatnot</p></li><li><p style=\"min-height:1.5em\">Lead the buildout and evolution of our data orchestration and streaming platforms, helping drive them from early platform investment to production-ready usage across the company</p></li><li><p style=\"min-height:1.5em\">Design scalable, reliable, multi-tenant data infrastructure rather than simply building pipelines on top of an existing platform</p></li><li><p style=\"min-height:1.5em\">Own core platform concerns including scalability, performance, reliability, SLOs, and operational excellence for data processing systems</p></li><li><p style=\"min-height:1.5em\">Build high-quality systems that support real-time analytics, event-driven applications, and machine learning infrastructure needs across Whatnot</p></li><li><p style=\"min-height:1.5em\">Make key decisions about how data systems should be integrated across Whatnot, and then partner cross-functionally to bring that architecture to life</p></li><li><p style=\"min-height:1.5em\">Collaborate closely with engineering partners across product, platform, machine learning, and data to enable fast, safe, and scalable development</p></li><li><p style=\"min-height:1.5em\">Help shape broader company architecture across orchestration, stream processing, real-time systems, analytics, and content understanding</p></li><li><p style=\"min-height:1.5em\">Apply DevOps/SRE practices, including CI/CD, infrastructure automation, monitoring, and incident response, to keep platform systems reliable at scale</p></li><li><p style=\"min-height:1.5em\">Help define and enforce data governance and compliance standards across our data lake and downstream systems</p></li></ul><p style=\"min-height:1.5em\"><strong>👋 You</strong></p><p style=\"min-height:1.5em\">As our next Software Engineer, Data Platform, you should have 8+ years of experience, plus:</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Ability to write well-tested, API-driven applications and services that run at scale in production</p></li><li><p style=\"min-height:1.5em\">Track record of building scalable, high-performance distributed systems</p></li><li><p style=\"min-height:1. thon), common algorithms and data structures, and software design principles</p></li><li><p style=\"min-height:1.5em\">Self-starter ethic, with the ability to thrive under a high level of autonomy</p></li><li><p style=\"min-height:1.5em\">Exceptional interpersonal and communication skills</p></li></ul><h2><br />🎁 Benefits </h2><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Generous Holiday and Time off Policy</p></li><li><p style=\"min-height:1.5em\">Health Insurance options including Medical, Dental, Vision</p></li><li><p style=\"min-height:1.5em\">Work From Home Support</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Home office setup allowance</p></li><li><p style=\"min-height:1.5em\">Monthly allowance for cell phone and internet</p></li></ul></li><li><p style=\"min-height:1.5em\">Care benefits</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">Monthly allowance for wellness</p></li><li><p style=\"min-height:1.5em\">Annual allowance towards Childcare</p></li><li><p style=\"min-height:1.5em\">Lifetime benefit for family planning, such as adoption or fertility expenses</p></li></ul></li><li><p style=\"min-height:1.5em\">Retirement; 401k offering for Traditional and Roth accounts in the US (employer match up to 4% of base salary) and Pension plans internationally</p></li><li><p style=\"min-height:1.5em\">Monthly allowance to dogfood the app</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">All Whatnauts are expected to develop a deep understanding of our product. We're passionate about building the best user experience, and all employees are expected to use Whatnot as both a buyer and a seller as part of their job (our dogfooding budget makes this fun and easy!).</p></li></ul></li><li><p style=\"min-height:1.5em\">Parental Leave</p><ul style=\"min-height:1.5em\"><li><p style=\"min-height:1.5em\">16 weeks of paid parental leave + one month gradual return to work *company leave allowances run con
