name: scrape-jobs
on:
  schedule:
    - cron: "0 */12 * * *"   # every 12h (00:00 & 12:00 UTC); GitHub may delay under load
  workflow_dispatch: {}

permissions:
  contents: write            # to commit the updated dedup DB

jobs:
  scrape:
    runs-on: ubuntu-latest
    concurrency: scrape       # never overlap runs (DB is single-writer)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python cli.py --config sources.yaml
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
      # Persist dedup state across runs by committing jobs.db back to the repo.
      - name: persist dedup state
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add jobs.db
          git diff --staged --quiet || git commit -m "update job dedup state [skip ci]"
          git push