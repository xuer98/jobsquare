filters:
  # Job is kept only if its title/dept/location matches at least one include
  # keyword, contains no exclude keyword, and (if set) is in one of locations.
  max_age_days: 7              # ignore postings older than a week; postings with
  # an unparseable/empty posted_at are kept
  include_keywords:
    - software engineer
    - backend
    - full stack
    - distributed systems
  exclude_keywords:
    - intern
    - manager
    - principal
    - staff      # drop if you only want senior-and-below; remove otherwise
    - india
    - canada
    - android
  locations:
    - Los Angeles
    - United States
    - California
    - US
    - New York
    - San Francisco
    - Sunnyvale
    - MountainView
    - San Jose
    - San Diego