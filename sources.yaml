
# Each source = one company's job board on a given ATS platform.
# The `company` value is the slug in that ATS's public URL.
#
# How to find the slug:
#   Greenhouse      job-boards.greenhouse.io/<company>          -> company
#   Lever           jobs.lever.co/<company>                     -> company
#   Ashby           jobs.ashbyhq.com/<company>                  -> company
#   SmartRecruiters jobs.smartrecruiters.com/<company>          -> company
#   Recruitee       <company>.recruitee.com                     -> company
#   Workable        apply.workable.com/<company> (or <company>.workable.com) -> company
#
# Workday is different — it needs host/tenant/site, not a single slug.
# From the public career URL:
#   https://nvidia.wd5.myworkdayjobs.com/en-US/NVIDIAExternalCareerSite
#     host=nvidia.wd5.myworkdayjobs.com  tenant=nvidia  site=NVIDIAExternalCareerSite
#
# Google is bespoke (no shared ATS, no slug). It has no documented JSON API, so
# the fetcher paginates the public results page and parses its server-rendered
# data. The global board is thousands of roles — narrow it server-side with
# `query` (and optionally `location`) rather than pulling everything:
#   - { ats: google, query: "software engineer", location: "United States" }
#
# (Slugs below are placeholders — swap in the boards you actually track.)

db: jobs.db
concurrency: 8

sources:
